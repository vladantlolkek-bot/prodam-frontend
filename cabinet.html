<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODAM — Личный кабинет</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-section { background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .profile-header { display: flex; align-items: center; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; }
        .profile-avatar-container { position: relative; cursor: pointer; }
        .profile-avatar-large { width: 120px; height: 120px; background: linear-gradient(135deg, #2b3a67, #3a4f8c); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 48px; font-weight: 700; background-size: cover; background-position: center; }
        .avatar-overlay { position: absolute; bottom: 0; right: 0; background: #2b3a67; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; cursor: pointer; border: 2px solid white; }
        .profile-title h2 { font-size: 28px; margin-bottom: 5px; color: #1a2639; }
        .profile-title p { color: #718096; }
        .profile-info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .info-card { background: #f8fafd; padding: 15px; border-radius: 15px; text-align: center; }
        .info-card label { font-size: 14px; color: #718096; display: block; margin-bottom: 5px; }
        .info-card .info-value { font-size: 24px; font-weight: 700; color: #1a2639; }
        
        .profile-edit-form { background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); display: none; }
        .profile-edit-form.show { display: block; animation: fadeIn 0.3s ease; }
        .profile-edit-form h3 { margin-bottom: 20px; color: #1a2639; }
        .edit-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .edit-form-group { margin-bottom: 15px; }
        .edit-form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #2d3e6f; }
        .edit-form-group input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; }
        .edit-form-group input:focus { outline: none; border-color: #2b3a67; }
        .edit-buttons { display: flex; gap: 15px; justify-content: flex-end; }
        .btn-edit { background: #2b3a67; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .btn-cancel { background: #e2e8f0; color: #4a5568; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .edit-profile-btn { background: transparent; border: 1px solid #2b3a67; color: #2b3a67; padding: 8px 16px; border-radius: 10px; cursor: pointer; margin-left: auto; }
        
        .cars-section { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .cars-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .add-car-btn { background: linear-gradient(135deg, #2b3a67, #3a4f8c); color: white; border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .add-car-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(43,58,103,0.3); }
        .cars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .car-card { background: #f8fafd; border-radius: 15px; padding: 20px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .car-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .car-card h4 { font-size: 18px; margin-bottom: 10px; color: #1a2639; }
        .car-details { list-style: none; margin-bottom: 15px; }
        .car-details li { padding: 5px 0; color: #4a5568; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .car-status { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .status-active { background: #d1fae5; color: #059669; }
        .status-sold { background: #fee2e2; color: #dc2626; }
        .car-actions { display: flex; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; }
        .car-actions button { background: none; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .car-actions button:hover { background: #2b3a67; color: white; border-color: #2b3a67; }
        .add-car-form { background: #f8fafd; border-radius: 15px; padding: 25px; margin-bottom: 30px; display: none; border: 1px solid #e2e8f0; }
        .add-car-form.show { display: block; animation: fadeIn 0.3s ease; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #2d3e6f; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2b3a67; }
        .submit-car-btn { background: #2b3a67; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .submit-car-btn:hover { background: #1e2b4f; transform: translateY(-2px); }
        .empty-state { text-align: center; padding: 60px 20px; color: #718096; }
        .empty-state button { background: linear-gradient(135deg, #2b3a67, #3a4f8c); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; }
        .avatar-input { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .profile-info-grid { grid-template-columns: 1fr; } .profile-header { flex-direction: column; text-align: center; } .form-row { grid-template-columns: 1fr; } .edit-form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo" onclick="location.href='index.html'">
                <span class="logo-icon">🚗</span>
                <h1>PRODAM</h1>
            </div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="index.html#pricing">Тарифы</a>
                <a href="index.html#contacts">Контакты</a>
                <button class="btn-outline btn" onclick="logout()">Выйти</button>
            </nav>
        </header>

        <div class="cabinet-container">
            <!-- Профиль пользователя -->
            <div class="profile-section">
                <div class="profile-header">
                    <div class="profile-avatar-container" onclick="document.getElementById('avatarInput').click()">
                        <div class="profile-avatar-large" id="userAvatar" style="background-size: cover; background-position: center;"></div>
                        <div class="avatar-overlay">📷</div>
                    </div>
                    <div class="profile-title">
                        <h2 id="userName"></h2>
                        <p id="userEmail"></p>
                        <p id="userSince"></p>
                    </div>
                    <button class="edit-profile-btn" onclick="toggleEditForm()">✏️ Редактировать профиль</button>
                </div>
                <div class="profile-info-grid">
                    <div class="info-card"><label>📱 Телефон</label><div class="info-value" id="userPhone">—</div></div>
                    <div class="info-card"><label>🚗 Машин</label><div class="info-value" id="userCarsCount">0</div></div>
                    <div class="info-card"><label>👀 Просмотров</label><div class="info-value" id="userViews">0</div></div>
                </div>
            </div>

            <!-- Форма редактирования профиля -->
            <div class="profile-edit-form" id="editProfileForm">
                <h3>Редактирование профиля</h3>
                <div class="edit-form-row">
                    <div class="edit-form-group">
                        <label>Имя</label>
                        <input type="text" id="editName" placeholder="Ваше имя">
                    </div>
                    <div class="edit-form-group">
                        <label>Телефон</label>
                        <input type="tel" id="editPhone" placeholder="+375 XX XXX-XX-XX">
                    </div>
                </div>
                <div class="edit-buttons">
                    <button class="btn-cancel" onclick="toggleEditForm()">Отмена</button>
                    <button class="btn-edit" onclick="saveProfile()">Сохранить изменения</button>
                </div>
            </div>

            <!-- Секция с автомобилями -->
            <div class="cars-section">
                <div class="cars-header">
                    <h3>🚗 Мои автомобили</h3>
                    <button class="add-car-btn" onclick="toggleAddCarForm()">+ Добавить автомобиль</button>
                </div>

                <div class="add-car-form" id="addCarForm">
                    <h4>Новый автомобиль</h4>
                    <div class="form-row">
                        <div class="form-group"><input type="text" id="carBrand" placeholder="Марка"></div>
                        <div class="form-group"><input type="text" id="carModel" placeholder="Модель"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><input type="number" id="carYear" placeholder="Год"></div>
                        <div class="form-group"><input type="number" id="carMileage" placeholder="Пробег (км)"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><input type="number" id="carPrice" placeholder="Цена (BYN)"></div>
                        <div class="form-group">
                            <select id="carStatus">
                                <option value="active">Активно</option>
                                <option value="sold">Продано</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group"><textarea id="carDescription" rows="3" placeholder="Описание"></textarea></div>
                    <button class="submit-car-btn" onclick="addCar()">Сохранить автомобиль</button>
                </div>

                <div id="carsList">
                    <div class="empty-state"><p>🚗 У вас пока нет добавленных автомобилей</p><button onclick="toggleAddCarForm()">+ Добавить первый автомобиль</button></div>
                </div>
            </div>
        </div>

        <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/jpg" style="display: none;" onchange="uploadAvatar(this)">

        <footer class="footer">
            <div class="logo" onclick="location.href='index.html'"><span class="logo-icon">🚗</span><h1>PRODAM</h1></div>
            <div class="footer-links"><a href="#">О нас</a><a href="#">Помощь</a><a href="#">Контакты</a></div>
            <div>© 2026 PRODAM</div>
        </footer>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        function getToken() { return localStorage.getItem('prodam_token'); }
        function getCurrentUser() { const user = localStorage.getItem('prodam_current_user'); return user ? JSON.parse(user) : null; }
        
        // ===== ЗАГРУЗКА ДАННЫХ ПОЛЬЗОВАТЕЛЯ =====
        async function loadUserData() {
            const currentUser = getCurrentUser();
            if (!currentUser) { window.location.href = 'login.html'; return; }
            
            document.getElementById('userName').textContent = currentUser.name || 'Без имени';
            document.getElementById('userEmail').textContent = currentUser.email || 'email не указан';
            
            const token = getToken();
            if (token) {
                try {
                    const response = await fetch(`${API_URL}/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        const userData = await response.json();
                        document.getElementById('userPhone').textContent = userData.phone || '—';
                        document.getElementById('editName').value = userData.name || '';
                        document.getElementById('editPhone').value = userData.phone || '';
                        if (userData.registered_at) {
                            const date = new Date(userData.registered_at);
                            document.getElementById('userSince').textContent = `На сайте с ${date.toLocaleDateString('ru-RU')}`;
                        }
                        if (userData.avatar) {
                            document.getElementById('userAvatar').style.backgroundImage = `url(${userData.avatar})`;
                            document.getElementById('userAvatar').style.backgroundSize = 'cover';
                            document.getElementById('userAvatar').style.backgroundPosition = 'center';
                            document.getElementById('userAvatar').textContent = '';
                        } else {
                            document.getElementById('userAvatar').style.backgroundImage = '';
                            document.getElementById('userAvatar').textContent = (currentUser.name?.charAt(0) || '?').toUpperCase();
                        }
                    }
                } catch (err) { console.error('Ошибка загрузки профиля:', err); }
            }
        }
        
        // ===== ЗАГРУЗКА МАШИН =====
        async function loadUserCars() {
            const token = getToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${API_URL}/my-cars`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) { logout(); return; }
                if (response.ok) {
                    const cars = await response.json();
                    displayCars(cars);
                }
            } catch (err) { console.error('Ошибка загрузки машин:', err); }
        }
        
        function displayCars(cars) {
            const container = document.getElementById('carsList');
            const carsCount = cars.length;
            const totalViews = cars.reduce((sum, car) => sum + (car.views || 0), 0);
            document.getElementById('userCarsCount').textContent = carsCount;
            document.getElementById('userViews').textContent = totalViews;
            
            if (carsCount === 0) {
                container.innerHTML = `<div class="empty-state"><p>🚗 У вас пока нет добавленных автомобилей</p><button onclick="toggleAddCarForm()">+ Добавить первый автомобиль</button></div>`;
                return;
            }
            
            let html = '<div class="cars-grid">';
            for (const car of cars) {
                const statusClass = car.status === 'active' ? 'status-active' : 'status-sold';
                const statusText = car.status === 'active' ? 'Активно' : 'Продано';
                html += `
                    <div class="car-card">
                        <h4>${escapeHtml(car.brand)} ${escapeHtml(car.model)}</h4>
                        <ul class="car-details">
                            <li>📅 ${car.year} г.</li>
                            <li>📏 ${Number(car.mileage).toLocaleString()} км</li>
                            <li>💰 ${Number(car.price).toLocaleString()} BYN</li>
                            <li>👀 ${car.views || 0} просмотров</li>
                        </ul>
                        <span class="car-status ${statusClass}">${statusText}</span>
                        <div class="car-actions"><button onclick="deleteCar(${car.id})">🗑️ Удалить</button></div>
                    </div>
                `;
            }
            container.innerHTML = html + '</div>';
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        // ===== РЕДАКТИРОВАНИЕ ПРОФИЛЯ =====
        function toggleEditForm() {
            document.getElementById('editProfileForm').classList.toggle('show');
        }
        
        async function saveProfile() {
            const name = document.getElementById('editName').value;
            const phone = document.getElementById('editPhone').value;
            const token = getToken();
            
            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, phone })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const currentUser = getCurrentUser();
                    currentUser.name = data.user.name;
                    localStorage.setItem('prodam_current_user', JSON.stringify(currentUser));
                    toggleEditForm();
                    loadUserData();
                    alert('Профиль успешно обновлён!');
                } else {
                    alert('Ошибка при сохранении');
                }
            } catch (err) {
                alert('Ошибка подключения к серверу');
            }
        }
        
        // ===== ЗАГРУЗКА АВАТАРА =====
        async function uploadAvatar(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const avatarBase64 = e.target.result;
                    const token = getToken();
                    
                    try {
                        const response = await fetch(`${API_URL}/avatar`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ avatar: avatarBase64 })
                        });
                        
                        if (response.ok) {
                            document.getElementById('userAvatar').style.backgroundImage = `url(${avatarBase64})`;
                            document.getElementById('userAvatar').style.backgroundSize = 'cover';
                            document.getElementById('userAvatar').style.backgroundPosition = 'center';
                            document.getElementById('userAvatar').textContent = '';
                            alert('Аватар обновлён!');
                        } else {
                            alert('Ошибка загрузки аватара');
                        }
                    } catch (err) {
                        alert('Ошибка подключения к серверу');
                    }
                };
                reader.readAsDataURL(file);
            }
        }
        
        // ===== ДОБАВЛЕНИЕ МАШИНЫ =====
        async function addCar() {
            const brand = document.getElementById('carBrand').value.trim();
            const model = document.getElementById('carModel').value.trim();
            const year = document.getElementById('carYear').value;
            const mileage = document.getElementById('carMileage').value;
            const price = document.getElementById('carPrice').value;
            const status = document.getElementById('carStatus').value;
            const description = document.getElementById('carDescription').value.trim();
            
            if (!brand || !model || !year || !mileage || !price) {
                alert('Заполните все обязательные поля');
                return;
            }
            
            const token = getToken();
            if (!token) { alert('Ошибка: вы не авторизованы'); return; }
            
            try {
                const response = await fetch(`${API_URL}/cars`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        brand, model,
                        year: parseInt(year),
                        mileage: parseInt(mileage),
                        price: parseInt(price),
                        status, description
                    })
                });
                
                if (response.ok) {
                    alert('Автомобиль успешно добавлен!');
                    document.getElementById('carBrand').value = '';
                    document.getElementById('carModel').value = '';
                    document.getElementById('carYear').value = '';
                    document.getElementById('carMileage').value = '';
                    document.getElementById('carPrice').value = '';
                    document.getElementById('carDescription').value = '';
                    document.getElementById('addCarForm').classList.remove('show');
                    await loadUserCars();
                } else {
                    const data = await response.json();
                    alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                }
            } catch (err) {
                alert('Ошибка подключения к серверу');
            }
        }
        
        async function deleteCar(carId) {
            if (!confirm('Удалить этот автомобиль?')) return;
            const token = getToken();
            try {
                const response = await fetch(`${API_URL}/cars/${carId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    alert('Автомобиль удалён');
                    await loadUserCars();
                } else { alert('Ошибка при удалении'); }
            } catch (err) { alert('Ошибка подключения к серверу'); }
        }
        
        function toggleAddCarForm() {
            document.getElementById('addCarForm').classList.toggle('show');
        }
        
        function logout() {
            localStorage.removeItem('prodam_token');
            localStorage.removeItem('prodam_current_user');
            window.location.href = 'index.html';
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            loadUserCars();
        });
    </script>
</body>
</html>
